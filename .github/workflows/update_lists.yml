name: Update Lists

on:
  workflow_dispatch:
  schedule:
    - cron: '00 7 * * 1'

permissions:
  contents: write

jobs:
  refresh-lists:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.x

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests openpyxl pandas

    - name: TOR Updater
      run: |
        python .github/workflows/tor_updater.py
    
    - name: Azure Updater
      run: |
        python .github/workflows/azure_updater.py
    
    - name: Convert Excel
      run: |
        python .github/workflows/convertxl.py

    - name: Commit and push changes
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git add *
        git commit -m "Auto-updated lists"
        git push https://x-access-token:$GITHUB_TOKEN@github.com/st0pp3r/Lists-of-Things.git
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
